<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바른생각 수학 출석체크</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f6f3; min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px;
  }
  .container { width: 100%; max-width: 480px; }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .date-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .date-row input[type="date"] {
    border: 1px solid #e0ddd8; border-radius: 8px; padding: 7px 12px;
    font-size: 14px; color: #1a1a1a; background: #fff; outline: none; cursor: pointer;
  }
  .today-btn {
    padding: 7px 12px; border-radius: 8px; border: 1px solid #e0ddd8;
    background: #fff; font-size: 13px; color: #78716c; cursor: pointer;
  }
  .today-btn:hover { background: #f0ede9; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: #a8a29e; margin-bottom: 10px;
  }
  .students-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .student-card {
    background: #fff; border: 1.5px solid #e0ddd8; border-radius: 12px;
    padding: 14px 16px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .student-card:hover { border-color: #c4b5a5; }
  .student-card.selected { border-color: #2d6a4f; background: #e8f5ef; }
  .student-card .name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  .student-card.selected .name { color: #1b4332; }
  .student-card .checks { display: flex; gap: 6px; flex-wrap: wrap; }
  .check-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    border: 1px solid #e0ddd8; color: #a8a29e; background: #f7f6f3; cursor: pointer;
  }
  .check-tag.on-attend { background: #2d6a4f; border-color: #2d6a4f; color: #fff; }
  .check-tag.on-hw { background: #1e6091; border-color: #1e6091; color: #fff; }
  .student-card:not(.selected) .check-tag { pointer-events: none; opacity: 0.4; }
  .divider { height: 1px; background: #e0ddd8; margin: 20px 0; }
  .summary {
    background: #fff; border: 1px solid #e0ddd8; border-radius: 12px;
    padding: 14px 16px; margin-bottom: 16px; min-height: 52px;
  }
  .summary-empty { font-size: 13px; color: #c4b5a5; text-align: center; padding: 4px 0; }
  .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .summary-row .sname { color: #1a1a1a; font-weight: 500; }
  .summary-row .stags { display: flex; gap: 4px; }
  .stag { font-size: 11px; padding: 2px 7px; border-radius: 20px; }
  .stag.attend { background: #e8f5ef; color: #2d6a4f; }
  .stag.absent { background: #fce8e8; color: #c0392b; }
  .stag.hw { background: #e8f0fb; color: #1e6091; }
  .save-btn {
    width: 100%; padding: 13px; background: #2d6a4f; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .save-btn:hover { background: #245a42; }
  .save-btn:disabled { background: #c4b5a5; cursor: not-allowed; }
  .status { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .status.loading { display: block; background: #f0ede9; color: #78716c; }
  .status.success { display: block; background: #e8f5ef; color: #1b4332; }
  .status.error   { display: block; background: #fce8e8; color: #7b2424; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 출석 체크</h1>
    <div class="date-row">
      <input type="date" id="dateInput">
      <button class="today-btn" onclick="setToday()">오늘</button>
    </div>
  </div>

  <p class="section-label">수업 학생 선택</p>
  <div class="students-grid" id="studentGrid"></div>

  <div class="divider"></div>

  <p class="section-label">선택 요약</p>
  <div class="summary" id="summary">
    <p class="summary-empty">학생을 선택해주세요</p>
  </div>

  <button class="save-btn" id="saveBtn" onclick="save()" disabled>노션에 저장</button>
  <div class="status" id="status"></div>
</div>

<script>
const WORKER_URL = "https://123.bhyunzzz.workers.dev";
const DB_ID = "3528ec9ccffb803f9f53e900a2499e7f";
const STUDENTS = ["이연서", "김서현", "최연우", "김민규"];
const state = {};
STUDENTS.forEach(n => { state[n] = { selected: false, attend: false, hw: false }; });

function setToday() {
  document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
}
function getDate() { return document.getElementById('dateInput').value; }

function toggleStudent(name) {
  state[name].selected = !state[name].selected;
  if (!state[name].selected) { state[name].attend = false; state[name].hw = false; }
  render();
}
function toggleAttend(e, name) {
  e.stopPropagation();
  if (!state[name].selected) return;
  state[name].attend = !state[name].attend;
  render();
}
function toggleHw(e, name) {
  e.stopPropagation();
  if (!state[name].selected) return;
  state[name].hw = !state[name].hw;
  render();
}

function render() {
  const grid = document.getElementById('studentGrid');
  grid.innerHTML = '';
  STUDENTS.forEach(name => {
    const s = state[name];
    const card = document.createElement('div');
    card.className = 'student-card' + (s.selected ? ' selected' : '');
    card.onclick = () => toggleStudent(name);
    card.innerHTML = `
      <div class="name">${name}</div>
      <div class="checks">
        <span class="check-tag ${s.attend ? 'on-attend' : ''}" onclick="toggleAttend(event,'${name}')">출석</span>
        <span class="check-tag ${s.hw ? 'on-hw' : ''}" onclick="toggleHw(event,'${name}')">과제</span>
      </div>`;
    grid.appendChild(card);
  });

  const selected = STUDENTS.filter(n => state[n].selected);
  const summary = document.getElementById('summary');
  if (selected.length === 0) {
    summary.innerHTML = '<p class="summary-empty">학생을 선택해주세요</p>';
  } else {
    summary.innerHTML = selected.map(name => {
      const s = state[name];
      const at = s.attend ? `<span class="stag attend">출석</span>` : `<span class="stag absent">결석</span>`;
      const hw = s.hw ? `<span class="stag hw">과제완료</span>` : '';
      return `<div class="summary-row"><span class="sname">${name}</span><div class="stags">${at}${hw}</div></div>`;
    }).join('');
  }
  document.getElementById('saveBtn').disabled = selected.length === 0 || !getDate();
}

async function save() {
  const date = getDate();
  const selected = STUDENTS.filter(n => state[n].selected);
  if (!selected.length || !date) return;

  const btn = document.getElementById('saveBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = '저장 중...';

  try {
    const results = await Promise.all(selected.map(name => {
      const s = state[name];
      return fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          parent: { database_id: DB_ID },
          properties: {
            '이름': { title: [{ text: { content: name } }] },
            '날짜': { date: { start: date } },
            '출석': { checkbox: s.attend }
          }
        })
      });
    }));

    const allOk = results.every(r => r.ok);
    if (allOk) {
      status.className = 'status success';
      status.textContent = `✓ ${selected.length}명 저장 완료! (${date})`;
      selected.forEach(n => { state[n] = { selected: false, attend: false, hw: false }; });
      render();
    } else {
      const errData = await results.find(r => !r.ok).json();
      throw new Error(errData?.message || '저장 실패');
    }
  } catch (e) {
    status.className = 'status error';
    status.textContent = `저장 실패: ${e.message}`;
    btn.disabled = false;
  }
}

setToday();
render();
</script>
</body>
</html>
